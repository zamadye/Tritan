services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tritan-app
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - PORT=3000
    expose:
      - "3000"
    volumes:
      - ../data:/app/data:ro

  nginx:
    image: nginx:alpine
    container_name: tritan-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
